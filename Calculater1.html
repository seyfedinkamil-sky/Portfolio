<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modern · calculator</title>
  <link rel="stylesheet" href="newstyl.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #f0f4ff 0%, #d9e2f0 100%);
  padding: 1.5rem;
}

.calculator-wrapper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}

.calculator {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 2.5rem;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
  padding: 1.75rem 1.5rem 2rem;
  transition: box-shadow 0.2s ease;
}

.display {
  background: rgba(18, 28, 46, 0.08);
  border-radius: 2rem;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.75rem;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  word-break: break-all;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02) inset;
}

.expression {
  font-size: 1.1rem;
  font-weight: 400;
  color: #334155;
  letter-spacing: 0.3px;
  min-height: 1.8rem;
  line-height: 1.5;
  opacity: 0.8;
  width: 100%;
  text-align: right;
}

.result {
  font-size: 3rem;
  font-weight: 600;
  color: #0b1a2f;
  line-height: 1.2;
  transition: font-size 0.15s ease;
  width: 100%;
  text-align: right;
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.85rem;
}

.btn {
  font-size: 1.5rem;
  font-weight: 500;
  padding: 0.9rem 0.2rem;
  border: none;
  border-radius: 1.5rem;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
  color: #0f1a2e;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1 / 1;
  line-height: 1;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.95);
  transform: scale(0.97);
  box-shadow: 0 8px 18px rgba(0, 20, 40, 0.08);
}

.btn:active {
  transform: scale(0.92);
  background: rgba(230, 240, 255, 0.9);
}

.btn.number {
  background: rgba(255, 255, 255, 0.5);
  color: #0b1a2f;
  font-weight: 500;
}

.btn.number:hover {
  background: #ffffff;
}

.btn.operator {
  background: rgba(220, 235, 255, 0.6);
  color: #1a4b8c;
  font-weight: 600;
  font-size: 1.7rem;
}

.btn.operator:hover {
  background: #c7ddfa;
}

.btn.function {
  background: rgba(235, 240, 250, 0.6);
  color: #2c3e5a;
  font-weight: 600;
  font-size: 1.3rem;
}

.btn.function:hover {
  background: #dce4f0;
}

.btn.equals {
  background: #1a4b8c;
  color: white;
  font-weight: 600;
  font-size: 2rem;
  box-shadow: 0 8px 16px -6px rgba(26, 75, 140, 0.3);
}

.btn.equals:hover {
  background: #0f3a6e;
  transform: scale(0.97);
  box-shadow: 0 10px 20px -8px rgba(26, 75, 140, 0.4);
}

.btn.equals:active {
  transform: scale(0.92);
}

.btn.zero {
  grid-column: span 2;
  aspect-ratio: auto;
  padding: 0.9rem 0.2rem;
}

@media (max-width: 480px) {
  .calculator {
    padding: 1.25rem 1rem 1.5rem;
    border-radius: 2rem;
  }
  .button-grid {
    gap: 0.6rem;
  }
  .btn {
    font-size: 1.4rem;
    border-radius: 1.25rem;
    padding: 0.7rem 0.2rem;
  }
  .result {
    font-size: 2.5rem;
  }
  .expression {
    font-size: 1rem;
  }
}

@media (max-width: 380px) {
  .button-grid {
    gap: 0.45rem;
  }
  .btn {
    font-size: 1.2rem;
    border-radius: 1rem;
    padding: 0.5rem 0.2rem;
  }
  .result {
    font-size: 2rem;
  }
  .calculator {
    padding: 1rem 0.75rem 1.25rem;
  }
}

@media (hover: none) {
  .btn:hover {
    transform: none;
    background: rgba(255,255,255,0.7);
  }
  .btn.equals:hover {
    background: #1a4b8c;
    transform: none;
  }
}
  </style>
</head>
<body>
  <main class="calculator-wrapper">
    <section class="calculator" role="application" aria-label="Calculator">
      <div class="display" aria-live="polite" aria-atomic="true">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="button-grid">
        <button class="btn function" data-value="clear">C</button>
        <button class="btn function" data-value="delete">DEL</button>
        <button class="btn operator" data-value="%">%</button>
        <button class="btn operator" data-value="/">÷</button>

        <button class="btn number" data-value="7">7</button>
        <button class="btn number" data-value="8">8</button>
        <button class="btn number" data-value="9">9</button>
        <button class="btn operator" data-value="*">×</button>

        <button class="btn number" data-value="4">4</button>
        <button class="btn number" data-value="5">5</button>
        <button class="btn number" data-value="6">6</button>
        <button class="btn operator" data-value="-">−</button>

        <button class="btn number" data-value="1">1</button>
        <button class="btn number" data-value="2">2</button>
        <button class="btn number" data-value="3">3</button>
        <button class="btn operator" data-value="+">+</button>

        <button class="btn number zero" data-value="0">0</button>
        <button class="btn number" data-value=".">.</button>
        <button class="btn equals" data-value="equals">=</button>
      </div>
    </section>
  </main>

  <script>
    // script.js - Fixed calculator logic

// DOM elements
const resultDisplay = document.getElementById('result');
const expressionDisplay = document.getElementById('expression');

// Calculator state
let currentInput = '0';
let previousInput = '';
let operator = null;
let shouldResetScreen = false;

// Update the display
function updateDisplay() {
  resultDisplay.textContent = currentInput;
  expressionDisplay.textContent = previousInput + (operator || '');
}

// Handle number input
function inputNumber(value) {
  if (shouldResetScreen) {
    currentInput = '0';
    shouldResetScreen = false;
  }
  
  if (value === '.' && currentInput.includes('.')) return;
  
  if (currentInput === '0' && value !== '.') {
    currentInput = value;
  } else {
    currentInput += value;
  }
  updateDisplay();
}

// Handle operator input
function inputOperator(op) {
  if (operator && !shouldResetScreen) {
    calculate();
  }
  
  previousInput = currentInput;
  operator = op;
  shouldResetScreen = true;
  updateDisplay();
}

// Calculate the result
function calculate() {
  if (!operator || !previousInput) return;
  
  const num1 = parseFloat(previousInput);
  const num2 = parseFloat(currentInput);
  
  if (isNaN(num1) || isNaN(num2)) {
    currentInput = 'Error';
    operator = null;
    previousInput = '';
    shouldResetScreen = true;
    updateDisplay();
    return;
  }
  
  let result;
  switch (operator) {
    case '+':
      result = num1 + num2;
      break;
    case '-':
      result = num1 - num2;
      break;
    case '*':
      result = num1 * num2;
      break;
    case '/':
      if (num2 === 0) {
        currentInput = 'Error';
        operator = null;
        previousInput = '';
        shouldResetScreen = true;
        updateDisplay();
        return;
      }
      result = num1 / num2;
      break;
    case '%':
      result = (num1 * num2) / 100;
      break;
    default:
      return;
  }
  
  // Format result to avoid floating point issues
  currentInput = Number.isInteger(result) ? String(result) : parseFloat(result.toPrecision(12)).toString();
  operator = null;
  previousInput = '';
  shouldResetScreen = true;
  expressionDisplay.textContent = '';
  updateDisplay();
}

// Clear everything
function clearAll() {
  currentInput = '0';
  previousInput = '';
  operator = null;
  shouldResetScreen = false;
  updateDisplay();
  expressionDisplay.textContent = '';
}

// Delete last character
function deleteLast() {
  if (shouldResetScreen) return;
  if (currentInput.length > 1) {
    currentInput = currentInput.slice(0, -1);
  } else {
    currentInput = '0';
  }
  updateDisplay();
}

// Handle keyboard input
function handleKeyboard(e) {
  const key = e.key;
  
  // Prevent default for calculator keys
  if (/^[0-9.]$/.test(key) || ['+', '-', '*', '/', '%', 'Enter', 'Backspace', 'Escape', 'Delete'].includes(key)) {
    e.preventDefault();
  }
  
  if (/^[0-9]$/.test(key)) {
    inputNumber(key);
  } else if (key === '.') {
    inputNumber('.');
  } else if (key === '+') {
    inputOperator('+');
  } else if (key === '-') {
    inputOperator('-');
  } else if (key === '*') {
    inputOperator('*');
  } else if (key === '/') {
    inputOperator('/');
  } else if (key === '%') {
    inputOperator('%');
  } else if (key === 'Enter' || key === '=') {
    calculate();
  } else if (key === 'Backspace') {
    deleteLast();
  } else if (key === 'Escape' || key === 'Delete') {
    clearAll();
  }
}

// Button click handler
function handleButtonClick(e) {
  const btn = e.currentTarget;
  const value = btn.dataset.value;
  
  if (btn.classList.contains('number')) {
    inputNumber(value);
  } else if (btn.classList.contains('operator')) {
    inputOperator(value);
  } else if (value === 'clear') {
    clearAll();
  } else if (value === 'delete') {
    deleteLast();
  } else if (value === 'equals') {
    calculate();
  }
}

// Add event listeners
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', handleButtonClick);
});

document.addEventListener('keydown', handleKeyboard);

// Initialize display
updateDisplay();
  </script>
</body>
</html>
