<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 25px;
        }
        
        h1 {
            color: #3a7bd5;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .input {
            display: flex;
            margin-bottom: 20px;
        }
        
        #task-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px 0 0 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #task-input:focus {
            border-color: #3a7bd5;
        }
        
        #add-btn {
            background-color: #3a7bd5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        
        #add-btn:hover {
            background-color: #2c66b2;
        }
        
        .filter-section {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .filter-btn {
            background-color: #f1f5fe;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background-color: #3a7bd5;
            color: white;
        }
        
        .task-list {
            list-style-type: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #f9fafc;
            border-radius: 5px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s;
            border-left: 4px solid #3a7bd5;
        }
        
        .task-item.completed {
            border-left-color: #4caf50;
            opacity: 0.7;
        }
        
        .task-text {
            flex: 1;
            margin: 0 15px;
            word-break: break-word;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }
        
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .delete-btn {
            background-color: #3f0404;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .delete-btn:hover {
            background-color: #0fc02f;
        }
        
        .empty-state {
            text-align: center;
            color: #888;
            padding: 20px;
            display: none;
        }
        
        .empty-state.visible {
            display: block;
        }
    
    </style>
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>
        
        <div class="input">
            <input type="text" id="task-input" placeholder="Enter a new task...">
            <button id="add-btn">Add Task</button>
        </div>
        
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        
        <ul class="task-list" id="task-list">
            <!-- Tasks will be added here dynamically -->
        </ul>
        
        <div class="empty-state" id="empty-state">
            No tasks yet. Add a task to get started!
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const taskInput = document.getElementById('task-input');
            const addBtn = document.getElementById('add-btn');
            const taskList = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            // Current filter //which filter is active (all, active, completed)
            let currentFilter = 'all';
            
            // Load tasks from localStorage
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];  //array innitialized
            
            // Initialize the app
            function init() {
                renderTasks();
                updateEmptyState();
                
                // Event listeners
                addBtn.addEventListener('click', addTask);
                taskInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        addTask();
                    }
                });
                
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        // Update active filter button
                        filterBtns.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        
                        // Set current filter and re-render
                        currentFilter = this.getAttribute('data-filter');
                        renderTasks();
                    });
                });
            }
            
            // Add a new task
            function addTask() {
                const taskText = taskInput.value.trim();
                
                if (taskText) {
                    // Create new task object
                    const newTask = {
                        id: Date.now(),
                        text: taskText,
                        completed: false
                    };
                    
                    // Add to tasks array
                    tasks.push(newTask);
                    
                    // Save to localStorage
                    saveTasks();
                    
                    // Clear input
                    taskInput.value = '';
                    
                    // Re-render tasks
                    renderTasks();
                    updateEmptyState();
                }
            }
            
            // Render tasks based on current filter
            function renderTasks() {
                // Clear the task list
                taskList.innerHTML = '';
                
                // Filter tasks based on current filter
                let filteredTasks = tasks;
                if (currentFilter === 'active') {
                    filteredTasks = tasks.filter(task => !task.completed);
                } else if (currentFilter === 'completed') {
                    filteredTasks = tasks.filter(task => task.completed);
                }
                
                // Render each task    clear the current task list 
                filteredTasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    li.setAttribute('data-id', task.id);
                    
                    li.innerHTML = `
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <span class="task-text">${task.text}</span>
                        <button class="delete-btn">×</button>
                    `;
                    
                    taskList.appendChild(li);
                });
                
                // Add event listeners to the new elements
                attachEventListeners();
            }
            
            // Attach event listeners to task items
            function attachEventListeners() {
                // Checkbox event listeners
                document.querySelectorAll('.task-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', function() {
                        const taskId = parseInt(this.closest('.task-item').getAttribute('data-id'));
                        toggleTaskCompleted(taskId);
                    });
                });
                
                // Delete button event listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const taskId = parseInt(this.closest('.task-item').getAttribute('data-id'));
                        deleteTask(taskId);
                    });
                });
            }
            
            // Toggle task completed status
            function toggleTaskCompleted(taskId) {
                tasks = tasks.map(task => {
                    if (task.id === taskId) {
                        return { ...task, completed: !task.completed };
                    }
                    return task;
                });
                
                saveTasks();
                renderTasks();
            }
            
            // Delete a task
            function deleteTask(taskId) {
                tasks = tasks.filter(task => task.id !== taskId);
                saveTasks();
                renderTasks(); 
                updateEmptyState();
            }
            
            // Save tasks to localStorage
            function saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }
            
            // Update empty state message
            function updateEmptyState() {  //updateEmpatyState() show or hidden 
                if (tasks.length === 0) {
                    emptyState.classList.add('visible');
                } else {
                    emptyState.classList.remove('visible');
                }
            }
            
            // Initialize the app
            init();     //start the app
        });
    </script>
</body>
</html>
